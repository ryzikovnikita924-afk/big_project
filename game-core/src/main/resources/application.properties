# Server Configuration
server.port=8080
server.error.include-message=always

# Spring Application Name
spring.application.name=geostrat-game-core

# ===============================================
# PostgreSQL Configuration
# ===============================================
spring.datasource.url=jdbc:postgresql://postgres:5432/geostrat
spring.datasource.username=geostrat
spring.datasource.password=geostrat123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
issuer-uri=http://keycloak:8080/realms/geostrat

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ===============================================
# Redis Configuration
# ===============================================
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=redis123
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Redis Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# OAuth2 Client
spring.security.oauth2.client.registration.keycloak.client-id=geostrat-client
spring.security.oauth2.client.registration.keycloak.client-secret=${OAUTH2_CLIENT_SECRET}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri=http://localhost:8080/login/oauth2/code/keycloak

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://keycloak:8080/realms/geostrat
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username
spring.security.oauth2.client.provider.keycloak.authorization-uri=http://localhost:8081/realms/geostrat/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=http://localhost:8081/realms/geostrat/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=http://localhost:8081/realms/geostrat/protocol/openid-connect/certs

logging.level.org.springframework.security.oauth2.client=TRACE
logging.level.org.springframework.security.oauth2.core=TRACE
logging.level.org.springframework.web.client=TRACE
logging.level.org.springframework.security.authentication=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.security.oauth2.jwt=TRACE
logging.level.org.springframework.security.oauth2.server.resource=TRACE

# Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/geostrat


# ???? ????????? endpoints
spring.security.oauth2.client.provider.keycloak.user-info-uri=http://keycloak:8080/realms/geostrat/protocol/openid-connect/userinfo

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/geostrat/protocol/openid-connect/certs
# ===============================================
# Logging
# ===============================================
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} | %-5level | %-20.20thread | %-36.36logger{36} | %msg%n

# ===============================================
# Actuator
# ===============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.redis.enabled=true
management.health.db.enabled=true

# ===============================================
# Thymeleaf
# ===============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ===============================================
# Game Specific Settings
# ===============================================
game.world.width=10
game.world.height=10
game.ai.default-tactic=BALANCED
game.auto-save-interval-seconds=30