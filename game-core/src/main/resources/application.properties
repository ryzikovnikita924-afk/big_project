# ===============================================
# Server
# ===============================================
server.port=8080
server.error.include-message=always
server.forward-headers-strategy=framework

# ===============================================
# App
# ===============================================
spring.application.name=geostrat-game-core

# ===============================================
# Database
# ===============================================
spring.datasource.url=jdbc:postgresql://postgres:5432/geostrat
spring.datasource.username=geostrat
spring.datasource.password=geostrat123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================================
# Redis
# ===============================================
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=redis123
spring.data.redis.timeout=2000ms

# ===============================================
# OAuth2 (FIXED)
# ===============================================

spring.security.oauth2.client.registration.keycloak.client-id=geostrat-client
spring.security.oauth2.client.registration.keycloak.client-secret=9SOuKBohMpi7QuksYZfv5o6mp3hYmu70
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code

spring.security.oauth2.client.provider.keycloak.authorization-uri=http://localhost:4180/oauth2/auth
spring.security.oauth2.client.registration.keycloak.redirect-uri=http://localhost:4180/oauth2/callback

spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8081/realms/geostrat
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username

# ===============================================
# CORS
# ===============================================
spring.web.cors.allowed-origins=http://localhost:8080,http://localhost
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ===============================================
# Logging
# ===============================================
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG

# REMOVE THIS (IMPORTANT)
# spring.autoconfigure.exclude=...

# ===============================================
# Actuator
# ===============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===============================================
# Thymeleaf
# ===============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ===============================================
# Game
# ===============================================
game.world.width=10
game.world.height=10
game.ai.default-tactic=BALANCED
game.auto-save-interval-seconds=30