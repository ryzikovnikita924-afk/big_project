<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoStrat - Клеточная стратегия</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .cell {
            width: 65px;
            height: 65px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
            border-radius: 4px;
        }
        .cell:hover { transform: scale(0.95); filter: brightness(1.1); }
        .cell.selected { border: 3px solid #fbbf24; box-shadow: 0 0 10px #fbbf24; }
        .player1 { background: linear-gradient(135deg, #7f1d1d, #dc2626); }
        .player2 { background: linear-gradient(135deg, #1e3a5f, #2563eb); }
        .neutral { background: linear-gradient(135deg, #334155, #475569); }
        .water { background: linear-gradient(135deg, #0c4a6e, #0284c7); }
        #map {
            display: grid;
            grid-template-columns: repeat(10, 65px);
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
        }
        .troops {
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 10px;
            margin-top: 4px;
        }
        .terrain-icon { font-size: 22px; }
    </style>
    <!-- ИСПРАВЛЕННЫЕ ПУТИ - убрал /static -->
    <script src="/js/auth.js" defer></script>
    <script src="/js/game.js" defer></script>
</head>
<body class="min-h-screen bg-base-200">
<div class="mx-auto flex min-h-screen max-w-7xl flex-col gap-6 px-4 py-6">
    <header class="hero rounded-box bg-base-100 shadow-sm">
        <div class="hero-content w-full flex-col items-start gap-6 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <p class="text-sm uppercase tracking-[0.3em] text-primary">GeoStrat</p>
                <h1 class="text-4xl font-black">Клеточная стратегия</h1>
                <p class="max-w-2xl text-base-content/70">
                    Пошаговая стратегия | PvP | Экономика
                </p>
            </div>
            <div class="flex flex-col items-start gap-3 sm:items-end">
                <div id="auth-state" class="badge badge-neutral badge-lg">Проверяем сессию...</div>
                <div class="flex gap-3">
                    <a id="login-link" class="btn btn-outline btn-primary" href="/oauth2/authorization/keycloak">🔐 Войти через Keycloak</a>
                    <button id="logout-button" class="btn btn-neutral hidden" type="button">🚪 Выйти</button>
                </div>
            </div>
        </div>
    </header>

    <div class="grid gap-6 lg:grid-cols-[1fr_0.9fr]">
        <!-- Игровая карта -->
        <div class="card bg-base-100 shadow-sm">
            <div class="card-body">
                <h2 class="card-title">Игровая карта</h2>
                <div id="map" class="flex justify-center"></div>
            </div>
        </div>

        <!-- Информационная панель -->
        <div class="space-y-4">
            <div class="card bg-base-100 shadow-sm">
                <div class="card-body">
                    <h2 class="card-title">🎮 Управление ходом</h2>
                    <div class="flex justify-between">
                        <span>📊 Ход: <span id="turn-number">1</span></span>
                        <span>👑 Игрок: <span id="current-player">-</span></span>
                    </div>
                    <div id="turn-status" class="text-center font-bold">⏳ Загрузка...</div>
                    <div class="flex gap-2">
                        <button id="start-turn-btn" class="btn btn-primary flex-1 hidden">🎯 Начать ход</button>
                        <button id="end-turn-btn" class="btn btn-secondary flex-1 hidden">✅ Завершить ход</button>
                    </div>
                </div>
            </div>

            <div class="card bg-base-100 shadow-sm">
                <div class="card-body">
                    <h2 class="card-title">💰 Мои ресурсы</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <div>🪙 Золото: <span id="gold">0</span></div>
                        <div>🌲 Дерево: <span id="wood">0</span></div>
                        <div>🍖 Еда: <span id="food">0</span></div>
                        <div>⚔️ Войска: <span id="total-troops">0</span></div>
                    </div>
                </div>
            </div>

            <div id="attack-panel" class="card bg-base-100 shadow-sm hidden">
                <div class="card-body">
                    <h2 class="card-title">⚔️ Атака</h2>
                    <input type="number" id="troops-input" class="input input-bordered" placeholder="Количество войск" min="1">
                    <button id="attack-btn" class="btn btn-error">🔥 Атаковать!</button>
                </div>
            </div>

            <div class="card bg-base-100 shadow-sm">
                <div class="card-body">
                    <h2 class="card-title">🏆 Таблица лидеров</h2>
                    <div id="leaderboard-list" class="space-y-1 text-sm"></div>
                </div>
            </div>

            <div class="card bg-base-100 shadow-sm">
                <div class="card-body">
                    <h2 class="card-title">📜 Лог боя</h2>
                    <div id="battle-log" class="h-32 overflow-y-auto space-y-1 text-xs"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const AuthApi = window.AuthApi;
        const GameApi = window.GameApi;

        const authStateBadge = document.getElementById("auth-state");
        const logoutButton = document.getElementById("logout-button");
        const loginLink = document.getElementById("login-link");
        const startTurnBtn = document.getElementById("start-turn-btn");
        const endTurnBtn = document.getElementById("end-turn-btn");
        const attackPanel = document.getElementById("attack-panel");
        const attackBtn = document.getElementById("attack-btn");
        const troopsInput = document.getElementById("troops-input");

        let selectedCell = null;
        let mapData = null;
        let myPlayerId = null;
        let myPlayerName = null;
        let gameState = {
            canStartTurn: false,
            canAttack: false,
            gameState: 'WAITING',
            currentTurnPlayer: null,
            turn: 1
        };

        async function refreshAuthState() {
            try {
                const {status, body} = await AuthApi.getCurrentUser();
                const userInfo = body?.data?.userInfo ?? {};
                const authenticated = status === 200 && body?.data?.authenticated;

                authStateBadge.className = authenticated
                    ? "badge badge-success badge-lg"
                    : "badge badge-warning badge-lg";
                authStateBadge.textContent = authenticated
                    ? `Вы вошли как ${AuthApi.extractDisplayName(userInfo)}`
                    : "Гостевой режим";

                if (loginLink) {
                    if (authenticated) {
                        loginLink.classList.add('hidden');
                    } else {
                        loginLink.classList.remove('hidden');
                    }
                }

                logoutButton.classList.toggle("hidden", !authenticated);

                if (authenticated) {
                    await loadMap();
                    await checkGameState();
                }
            } catch (error) {
                console.error('Auth error:', error);
                authStateBadge.textContent = "Ошибка авторизации";
            }
        }

        async function loadMap() {
            try {
                const {body} = await GameApi.getMap();
                if (body) {
                    mapData = body;
                    if (!myPlayerId && mapData.players?.length > 0) {
                        myPlayerId = mapData.players[0]?.id;
                        myPlayerName = mapData.players[0]?.name;
                    }
                    renderMap();
                    updatePlayersList();
                }
            } catch (error) {
                console.error('Load map error:', error);
            }
        }

        function renderMap() {
            const mapDiv = document.getElementById('map');
            if (!mapData) return;

            mapDiv.innerHTML = '';
            for (let y = 0; y < 10; y++) {
                for (let x = 0; x < 10; x++) {
                    const cell = mapData.cells?.find(c => c.x === x && c.y === y);
                    if (!cell) continue;

                    const cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';
                    cellDiv.setAttribute('data-x', x);
                    cellDiv.setAttribute('data-y', y);

                    if (cell.water) cellDiv.classList.add('water');
                    else if (cell.owner === null) cellDiv.classList.add('neutral');
                    else if (cell.owner === myPlayerId) cellDiv.classList.add('player1');
                    else cellDiv.classList.add('player2');

                    let terrainIcon = '⬜';
                    switch(cell.terrain) {
                        case 'FOREST': terrainIcon = '🌲'; break;
                        case 'MOUNTAIN': terrainIcon = '⛰️'; break;
                        case 'CITY': terrainIcon = '🏙️'; break;
                        case 'WATER': terrainIcon = '💧'; break;
                        default: terrainIcon = '🌾';
                    }

                    cellDiv.innerHTML = `
                        <div class="terrain-icon">${terrainIcon}</div>
                        <div class="troops">⚔️ ${cell.troops}</div>
                    `;
                    cellDiv.onclick = () => selectCell(cell);

                    if (selectedCell && selectedCell.x === x && selectedCell.y === y) {
                        cellDiv.classList.add('selected');
                    }
                    mapDiv.appendChild(cellDiv);
                }
            }
        }

        function selectCell(cell) {
            if (!gameState.canAttack) {
                AuthApi.showAlert('battle-log', 'alert-warning', 'Сначала начните ход!');
                return;
            }

            selectedCell = cell;
            renderMap();

            attackPanel.classList.remove('hidden');

            const myCells = mapData.cells?.filter(c => c.owner === myPlayerId && !c.water);
            if (myCells?.length > 0) {
                troopsInput.max = Math.min(20, myCells[0].troops);
                troopsInput.min = 1;
                troopsInput.value = Math.min(troopsInput.max, Math.floor(cell.troops / 2) || 1);
            }
        }

        async function checkGameState() {
            try {
                const {body} = await GameApi.getGameState();
                if (body) {
                    gameState = body;
                    myPlayerId = body.myPlayerId;
                    myPlayerName = body.myPlayerName;

                    document.getElementById('turn-number').innerText = body.turn;
                    document.getElementById('current-player').innerText = body.currentTurnPlayer || '-';

                    if (body.winner) {
                        document.getElementById('turn-status').innerHTML = `🏆 ПОБЕДИТЕЛЬ: ${body.winner}! 🏆`;
                        return;
                    }

                    if (body.canAttack) {
                        startTurnBtn.classList.add('hidden');
                        endTurnBtn.classList.remove('hidden');
                        document.getElementById('turn-status').innerHTML = `🎲 ВАШ ХОД! Действуйте! (${myPlayerName})`;
                    } else if (body.canStartTurn) {
                        startTurnBtn.classList.remove('hidden');
                        endTurnBtn.classList.add('hidden');
                        document.getElementById('turn-status').innerHTML = `🎯 ВАШ ХОД! Нажмите "Начать ход" (${myPlayerName})`;
                    } else {
                        startTurnBtn.classList.add('hidden');
                        endTurnBtn.classList.add('hidden');
                        document.getElementById('turn-status').innerHTML = `⏳ Ожидание хода: ${body.currentTurnPlayer || 'противника'}`;
                    }

                    updateResources(body);
                }
            } catch (error) {
                console.error('Check game state error:', error);
            }
        }

        function updateResources(state) {
            if (state) {
                document.getElementById('gold').innerText = state.myGold || 0;
                document.getElementById('wood').innerText = state.myWood || 0;
                document.getElementById('food').innerText = state.myFood || 0;
                document.getElementById('total-troops').innerText = state.myTroops || 0;
            }
        }

        function updatePlayersList() {
            const playersDiv = document.getElementById('players-list');
            if (!playersDiv) return;

            if (!mapData?.players?.length) {
                playersDiv.innerHTML = '<div>Нет игроков</div>';
                return;
            }

            playersDiv.innerHTML = mapData.players.map(player => `
                <div class="flex justify-between items-center py-2 border-b border-base-300">
                    <div>
                        <span class="badge ${player.id === myPlayerId ? 'badge-success' : 'badge-neutral'} mr-2"></span>
                        <span>${player.name} ${player.id === myPlayerId ? '(Вы)' : ''}</span>
                    </div>
                    <div class="text-sm">
                        <span>🏠 ${player.cellsCount} | 🏆 ${player.victories}</span>
                    </div>
                </div>
            `).join('');
        }

        async function loadLeaderboard() {
            try {
                const {body} = await GameApi.getLeaderboard();
                if (body && Array.isArray(body)) {
                    const container = document.getElementById('leaderboard-list');
                    container.innerHTML = body.map((player, idx) => `
                        <div class="flex justify-between items-center">
                            <span class="${idx < 3 ? 'font-bold text-primary' : ''}">${idx + 1}. ${player.name}</span>
                            <span>🏆 ${player.totalWins} побед</span>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Load leaderboard error:', error);
            }
        }

        function addBattleLog(message) {
            const logDiv = document.getElementById('battle-log');
            const entry = document.createElement('div');
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.insertBefore(entry, logDiv.firstChild);
        }

        startTurnBtn.onclick = async () => {
            const {body} = await GameApi.startTurn();
            if (body?.success) {
                addBattleLog('🎮 Начат новый ход! Получены ресурсы.');
                await checkGameState();
                await loadMap();
            } else {
                AuthApi.showAlert('battle-log', 'alert-error', body?.message || 'Не удалось начать ход');
            }
        };

        endTurnBtn.onclick = async () => {
            const {body} = await GameApi.endTurn();
            if (body?.success) {
                addBattleLog('✅ Ход завершен!');
                selectedCell = null;
                attackPanel.classList.add('hidden');
                await checkGameState();
                await loadMap();
            } else {
                AuthApi.showAlert('battle-log', 'alert-error', body?.message || 'Не удалось завершить ход');
            }
        };

        attackBtn.onclick = async () => {
            if (!selectedCell) {
                AuthApi.showAlert('battle-log', 'alert-warning', 'Выберите клетку для атаки!');
                return;
            }

            const troops = troopsInput.value;
            if (!troops || troops < 1) {
                AuthApi.showAlert('battle-log', 'alert-warning', 'Введите количество войск!');
                return;
            }

            const {body} = await GameApi.attack(selectedCell.x, selectedCell.y, parseInt(troops));
            if (body?.status === 'ok') {
                addBattleLog(`⚔️ Атака на клетку [${selectedCell.x},${selectedCell.y}] с ${troops} войсками!`);
                await loadMap();
                await checkGameState();
            } else {
                AuthApi.showAlert('battle-log', 'alert-error', body?.message || 'Ошибка атаки');
            }
        };

        logoutButton.addEventListener("click", async () => {
            await AuthApi.logout();
            AuthApi.showAlert("battle-log", "alert-success", "Сессия завершена");
            setTimeout(() => {
                window.location.href = "/login.html";
            }, 500);
        });

        await AuthApi.ensureCsrfCookie();
        await refreshAuthState();
        await loadLeaderboard();

        setInterval(() => {
            if (!gameState.canAttack && !gameState.canStartTurn) {
                loadMap();
            }
            checkGameState();
            loadLeaderboard();
        }, 5000);
    });
</script>
</body>
</html>
