services:

  postgres:
    image: postgres:18-alpine
    container_name: geostrat-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geostrat}
      POSTGRES_USER: ${POSTGRES_USER:-geostrat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geostrat123}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geostrat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geostrat-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: geostrat-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geostrat-network
    restart: unless-stopped

  game-core:
    build:
      context: ../../game-core
      dockerfile: Dockerfile
    container_name: geostrat-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-geostrat}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-geostrat}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-geostrat123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - geostrat-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: geostrat-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - game-core
    networks:
      - geostrat-network
    restart: unless-stopped

networks:
  geostrat-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: