services:
  postgres:
    image: postgres:17-alpine
    container_name: geostrat-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geostrat}
      POSTGRES_USER: ${POSTGRES_USER:-geostrat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geostrat123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geostrat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geostrat-network
    restart: unless-stopped

  keycloak-postgres:
    image: postgres:15-alpine
    container_name: geostrat-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak123}
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      - geostrat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: geostrat-keycloak
    command: start-dev --http-port=8080
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak123}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_FEATURES: preview
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY: edge

    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/realms/master"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - geostrat-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: geostrat-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geostrat-network
    restart: unless-stopped

  game-core:
    extra_hosts:
      - "localhost:host-gateway"
    build:
      context: ../../game-core
      dockerfile: Dockerfile
    container_name: geostrat-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-geostrat}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-geostrat}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-geostrat123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/geostrat
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID: ${OAUTH2_CLIENT_ID:-geostrat-client}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET}
      OAUTH2_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET}
      SERVER_PORT: 8080
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/geostrat/protocol/openid-connect/token
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/geostrat/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/geostrat/protocol/openid-connect/certs
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - geostrat-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: geostrat-oauth-proxy
    command:
      - --provider=keycloak
      - --http-address=0.0.0.0:4180
      - --client-id=geostrat-client
      - --client-secret=${OAUTH2_CLIENT_SECRET}
      - --redirect-url=http://localhost/oauth2/callback
      - --oidc-issuer-url=http://localhost:8081/realms/geostrat
      - --login-url=http://localhost:8081/realms/geostrat/protocol/openid-connect/auth
      - --redeem-url=http://localhost:8081/realms/geostrat/protocol/openid-connect/token
      - --profile-url=http://localhost:8081/realms/geostrat/protocol/openid-connect/userinfo
      - --validate-url=http://localhost:8081/realms/geostrat/protocol/openid-connect/userinfo
      - --scope=openid profile email
      - --email-domain=*
      - --upstream=http://game-core:8080
      - --cookie-secret=${COOKIE_SECRET}
      - --cookie-secure=false
      - --skip-auth-regex=^/$
      - --skip-auth-regex=^/api/players$
      - --skip-auth-regex=^/api/map$
      - --skip-auth-regex=^/api/game-state$
      - --skip-auth-regex=^/api/auth/check$
      - --skip-auth-regex=^/api/user/leaderboard$
      - --skip-auth-regex=^/index\.html$
      - --skip-auth-regex=^/css/.*$
      - --skip-auth-regex=^/js/.*$
      - --insecure-oidc-skip-issuer-verification=true
      - --skip-oidc-discovery=true
      - --provider=keycloak-oidc
      - --login-url=http://localhost:8081/realms/geostrat/protocol/openid-connect/auth
      - --redeem-url=http://keycloak:8080/realms/geostrat/protocol/openid-connect/token
      - --validate-url=http://keycloak:8080/realms/geostrat/protocol/openid-connect/userinfo
      - --profile-url=http://keycloak:8080/realms/geostrat/protocol/openid-connect/userinfo
      - --oidc-jwks-url=http://keycloak:8080/realms/geostrat/protocol/openid-connect/certs
    environment:
      OAUTH2_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
    ports:
      - "4180:4180"
    depends_on:
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
      game-core:
        condition: service_healthy
    networks:
      - geostrat-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: geostrat-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - oauth2-proxy
      - game-core
    networks:
      - geostrat-network
    restart: unless-stopped

networks:
  geostrat-network:
    driver: bridge

volumes:
  postgres_data:
  keycloak_postgres_data:
  redis_data:



