services:
  postgres:
    image: postgres:17-alpine
    container_name: geostrat-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geostrat}
      POSTGRES_USER: ${POSTGRES_USER:-geostrat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geostrat123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geostrat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geostrat-network
    restart: unless-stopped

  keycloak-postgres:
    image: postgres:15-alpine
    container_name: geostrat-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak123}
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      - geostrat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: geostrat-keycloak
    command:

      - start-dev
      - --http-port=8080
      - --hostname-strict=false
      - --hostname-strict-https=false
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak123}
    ports:
      - "8081:8080"
    networks:
      - geostrat-network
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: geostrat-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geostrat-network
    restart: unless-stopped

  game-core:
    extra_hosts:
      - "localhost:host-gateway"
    build:
      context: ../../game-core
      dockerfile: Dockerfile
    container_name: geostrat-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-geostrat}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-geostrat}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-geostrat123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}

      # ---- KEYCLOAK ----
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/geostrat
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID: geostrat-client
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET}

      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/geostrat/protocol/openid-connect/token
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/geostrat/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/geostrat/protocol/openid-connect/certs

      SERVER_PORT: 8080

    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - geostrat-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
    ports:
      - "4180:4180"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./oauth2-proxy.toml:/etc/oauth2-proxy/oauth2-proxy.toml:ro
    command:
      - --config=/etc/oauth2-proxy/oauth2-proxy.toml
    restart: no
    networks:
      geostrat-network:

networks:
  geostrat-network:
    driver: bridge
    name: local_serv_geostrat-network

volumes:
  postgres_data:
  keycloak_postgres_data:
  redis_data: