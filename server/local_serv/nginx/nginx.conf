upstream geostrat_backend {
    server game-core:8080;

}



server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;


    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;


    location ~ ^/api/(map|attack|player|events|health|actuator) {
        proxy_pass http://geostrat_backend;
    }


    location ~ ^/(css|js|images|static)/ {
        proxy_pass http://geostrat_backend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }


    location / {
        proxy_pass http://geostrat_backend;

    }


    location /health {
        proxy_pass http://geostrat_backend/actuator/health;
        access_log off;
    }

    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}