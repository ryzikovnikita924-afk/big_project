events {
    worker_connections 1024;
}

http {
    upstream geostrat_backend {
        server game-core:8080;
    }

    upstream oauth2_proxy {
        server oauth2-proxy:4180;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Кэш для сессий
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=auth_cache:10m max_size=100m inactive=60m use_temp_path=off;

    server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # OAuth2-Proxy endpoints (публичные, без аутентификации)
        location /oauth2/ {
            proxy_pass http://oauth2_proxy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Scheme $scheme;
            proxy_set_header X-Auth-Request-Redirect $request_uri;
        }

        # Эндпоинт аутентификации (внутренний)
        location = /oauth2/auth {
            proxy_pass http://oauth2_proxy/auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Scheme $scheme;
            proxy_set_header Content-Length "";
            proxy_pass_request_body off;
        }

        # Статика (доступна без аутентификации)
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            proxy_pass http://geostrat_backend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Health check (без аутентификации)
        location /actuator/health {
            proxy_pass http://geostrat_backend/actuator/health;
            access_log off;
        }

        # API endpoints (требуют аутентификации)
        location /api/ {
            # Проверка аутентификации
            auth_request /oauth2/auth;
            auth_request_set $user $upstream_http_x_forwarded_user;
            auth_request_set $email $upstream_http_x_forwarded_email;
            auth_request_set $preferred_username $upstream_http_x_forwarded_preferred_username;
            auth_request_set $given_name $upstream_http_x_forwarded_given_name;
            auth_request_set $family_name $upstream_http_x_forwarded_family_name;

            # Передаем информацию о пользователе в бэкенд
            proxy_set_header X-Forwarded-User $user;
            proxy_set_header X-Forwarded-Email $email;
            proxy_set_header X-Forwarded-Preferred-Username $preferred_username;
            proxy_set_header X-Forwarded-Given-Name $given_name;
            proxy_set_header X-Forwarded-Family-Name $family_name;

            # Если не авторизован - редирект на страницу входа
            error_page 401 = /oauth2/sign_in;

            proxy_pass http://geostrat_backend;
        }

        # Главная страница и SPA (требуют аутентификации)
        location / {
            auth_request /oauth2/auth;
            auth_request_set $user $upstream_http_x_forwarded_user;
            auth_request_set $email $upstream_http_x_forwarded_email;
            auth_request_set $preferred_username $upstream_http_x_forwarded_preferred_username;

            proxy_set_header X-Forwarded-User $user;
            proxy_set_header X-Forwarded-Email $email;
            proxy_set_header X-Forwarded-Preferred-Username $preferred_username;

            error_page 401 = /oauth2/sign_in;

            proxy_pass http://geostrat_backend;
        }

        # Страница входа OAuth2
        location /oauth2/sign_in {
            proxy_pass http://oauth2_proxy/oauth2/sign_in;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Scheme $scheme;
        }

        # Callback после аутентификации
        location /oauth2/callback {
            proxy_pass http://oauth2_proxy/oauth2/callback;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Scheme $scheme;
        }
    }
}