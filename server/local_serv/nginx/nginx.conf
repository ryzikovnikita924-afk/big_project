events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s ipv6=off;

    upstream game_core {
        server game-core:8080;
    }

    upstream oauth2_proxy {
        server oauth2-proxy:4180;
    }

    server {
        listen 80;
        server_name localhost;

        # OAuth2-Proxy endpoints (публичные)
        location /oauth2/ {
            proxy_pass http://oauth2_proxy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Внутренний эндпоинт аутентификации
        location = /oauth2/auth {
            internal;
            proxy_pass http://oauth2_proxy/auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-User "";
            proxy_set_header X-Forwarded-Email "";
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        # Публичные API (без аутентификации)
        location ~ ^/api/(players|map|game-state|leaderboard|auth/check) {
            proxy_pass http://game_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Защищенные API (требуют аутентификации)
        location ~ ^/api/(user/me|start-turn|end-turn|attack|save|load|ai/.*) {
            auth_request /oauth2/auth;
            auth_request_set $user $upstream_http_x_forwarded_user;
            auth_request_set $email $upstream_http_x_forwarded_email;

            proxy_set_header X-Forwarded-User $user;
            proxy_set_header X-Forwarded-Email $email;
            proxy_set_header X-Real-IP $remote_addr;

            error_page 401 = /oauth2/sign_in;
            proxy_pass http://game_core;
        }

        # Статика (доступна без аутентификации)
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            proxy_pass http://game_core;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Главная страница (доступна без аутентификации)
        location / {
            proxy_pass http://game_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}